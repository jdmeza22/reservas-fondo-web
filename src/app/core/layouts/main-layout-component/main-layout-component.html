<mat-sidenav-container class="layout-container">

  <mat-sidenav mode="side" [opened]="sidebarOpened()" class="sidebar">
    <div class="sidebar-header">
      <div class="logo">
        <mat-icon> travel_explore</mat-icon>
      </div>

      <div>
        <h2> Fondo </h2>
        <span>Reservas</span>
      </div>

    </div>

    <mat-nav-list>
      <a mat-list-item routerLink="/dashboard" routerLinkActive="active-link">
        <mat-icon matListItemIcon>
          dashboard
        </mat-icon>

        <span matListItemTitle> Dashboard</span>
      </a>

      <a mat-list-item routerLink="/reservas" routerLinkActive="active-link">
        <mat-icon matListItemIcon>
          event_available
        </mat-icon>

        <span matListItemTitle>Reservas </span>
      </a>
    </mat-nav-list>
  </mat-sidenav>

  <mat-sidenav-content>

    <mat-toolbar class="topbar">
      <button mat-icon-button (click)="  sidebarOpened.set(!sidebarOpened())">

        <mat-icon>
          menu
        </mat-icon>
      </button>

      <div class="spacer"></div>
      <div class="user-info">

        <mat-icon>
          account_circle
        </mat-icon>

        <span>{{authService.currentUser() ?.nombreCompleto }} </span>
      </div>

      <button mat-icon-button (click)="logout()">
        <mat-icon>
          logout
        </mat-icon>
      </button>

    </mat-toolbar>

    <div class="page-content">
      <router-outlet />
    </div>
  </mat-sidenav-content>
</mat-sidenav-container>
